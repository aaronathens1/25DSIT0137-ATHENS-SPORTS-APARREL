<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Gradient Definitions -->
    <defs>
        <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0070f3" />
            <stop offset="100%" stop-color="#ff5500" />
        </linearGradient>
        <linearGradient id="brandGradInverse" x1="100%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#ff5500" />
            <stop offset="100%" stop-color="#0070f3" />
        </linearGradient>
    </defs>
    
    <!-- Outer Shield/Emblem Base -->
    <path d="M100 20 L170 45 L160 120 C150 160 100 180 100 180 C100 180 50 160 40 120 L30 45 Z" 
          fill="url(#brandGrad)" opacity="0.1"/>
          
    <path d="M100 20 L170 45 L160 120 C150 160 100 180 100 180 C100 180 50 160 40 120 L30 45 Z" 
          stroke="url(#brandGradInverse)" stroke-width="4" fill="none" />

    <!-- Dynamic "A" Monogram -->
    <path d="M100 45 L50 140 H75 L85 110 H115 L125 140 H150 ZM90 95 L100 65 L110 95 Z" 
          fill="url(#brandGrad)" />
          
    <path d="M100 45 L50 140 H75 L85 110 H115 L125 140 H150 ZM90 95 L100 65 L110 95 Z" 
          stroke="#000000" stroke-width="2" />

    <!-- Swoosh / Athletic Line cutting through -->
    <path d="M35 110 Q 100 150 165 90" 
          stroke="url(#brandGradInverse)" stroke-width="8" stroke-linecap="round" fill="none"/>
</svg>
